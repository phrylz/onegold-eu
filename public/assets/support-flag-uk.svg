<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="100" height="60">
  <clipPath id="uk-clip"><rect width="60" height="30"/></clipPath>
  <rect width="60" height="30" fill="#012169"/>
  <!-- White diagonals -->
  <path d="M0,0 L60,30 M60,0 L0,30" stroke="white" stroke-width="6" clip-path="url(#uk-clip)"/>
  <!-- Red diagonals -->
  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#uk-clip)"/>
  <!-- White cross -->
  <rect x="24" y="0" width="12" height="30" fill="white"/>
  <rect x="0" y="9" width="60" height="12" fill="white"/>
  <!-- Red cross -->
  <rect x="26" y="0" width="8" height="30" fill="#C8102E"/>
  <rect x="0" y="11" width="60" height="8" fill="#C8102E"/>
</svg>
